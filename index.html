<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alfa Automação e Portões</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* BASE */
body {
  margin:0;
  font-family:'Montserrat', sans-serif;
  background:#fff;
  color:#0f172a;
}

/* ANIMAÇÃO */
.fade {
  opacity:0;
  transform:translateY(40px);
  transition:all 0.8s ease;
}
.fade.show {
  opacity:1;
  transform:translateY(0);
}

/* HERO */
.hero {
  min-height:75vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:60px 20px;
  background:linear-gradient(180deg,#0F2A44,#1E5AA8);
  color:white;
}

@media (max-width:768px){
  .hero {
    min-height:70vh;
    padding:40px 20px;
  }
}

/* LOGO */
.logo {
  height:320px;
  max-width:90%;
  object-fit:contain;
  filter: drop-shadow(0 15px 30px rgba(0,0,0,0.25));
}

@media (min-width:1024px){
  .logo { height:380px; }
}

@media (max-width:768px){
  .logo { height:160px; }
}

/* TIPOGRAFIA */
.upper {
  text-transform: uppercase;
  letter-spacing: 2.5px;
  font-size: 18px;
  font-weight: 800;
  color: #2FBF71 !important;
  margin-bottom: 12px;
  text-shadow: 0 2px 10px rgba(47,191,113,0.3);
}

@media (max-width:768px){
  .upper {
    font-size:15px;
  }
}

h1 {
  font-size:34px;
  font-weight:800;
}

h2 {
  font-size:26px;
  font-weight:700;
}

h3 {
  font-size:20px;
}

p {
  font-size:16px;
  color:#64748b;
}

/* BOTÃO */
.btn {
  margin-top:20px;
  padding:15px 35px;
  background:#2FBF71;
  color:white;
  border-radius:999px;
  text-decoration:none;
  font-weight:600;
}

/* SEÇÃO */
.section {
  padding:90px 20px;
  max-width:1100px;
  margin:auto;
  text-align:center;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:25px;
}

/* CARD */
.card {
  padding:25px;
  border-radius:20px;
  background:#f8fafc;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.card i {
  color:#2FBF71;
  margin-right:8px;
}

/* CARROSSEL */
.carousel {
  max-width:1000px;
  margin:auto;
  position:relative;
}

.slides {
  display:flex;
  gap:20px;
  overflow-x:auto;
  scroll-behavior:smooth;
  padding:10px;
}

.slides::-webkit-scrollbar {
  display:none;
}

.slides img,
.slides video {
  min-width:300px;
  height:220px;
  object-fit:cover;
  border-radius:20px;
  flex-shrink:0;
}

/* BOTÕES */
.carousel button {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:#2FBF71;
  border:none;
  color:white;
  font-size:24px;
  padding:10px;
  border-radius:50%;
  cursor:pointer;
}

.prev { left:10px; }
.next { right:10px; }

/* WHATS */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:14px;
  border-radius:50px;
  text-decoration:none;
}

</style>
</head>

<body>

<div class="hero fade">

<img src="logo.png" class="logo">

<p class="upper">ATENDIMENTO PROFISSIONAL</p>

<h1>PORTÕES AUTOMÁTICOS E SEGURANÇA SOB MEDIDA</h1>

<p style="color:#fff;">Instalação, manutenção e fabricação com padrão profissional</p>

<a class="btn" href="https://wa.me/5548991397281">FALAR NO WHATSAPP</a>

</div>

<div class="section fade">

<p class="upper">NOSSOS TRABALHOS</p>
<h2>Projetos realizados</h2>

<div class="carousel">

<button class="prev">‹</button>

<div class="slides" id="slides">

<video muted loop autoplay><source src="video1.mp4"></video>
<img src="foto1.jpg">
<img src="foto2.jpg">
<img src="foto3.jpg">

<video muted loop autoplay><source src="video1.mp4"></video>
<img src="foto1.jpg">
<img src="foto2.jpg">

</div>

<button class="next">›</button>

</div>

</div>

<a class="whatsapp" href="https://wa.me/5548991397281">WhatsApp</a>

<script>

/* ANIMAÇÃO SCROLL */
const elements = document.querySelectorAll('.fade');

window.addEventListener('scroll', () => {
  elements.forEach(el => {
    if(el.getBoundingClientRect().top < window.innerHeight - 100){
      el.classList.add('show');
    }
  });
});

/* CARROSSEL AUTO + PAUSA */
const slides = document.getElementById('slides');
let autoSlide = setInterval(() => {
  slides.scrollBy({ left: 1, behavior: 'smooth' });
}, 20);

/* PAUSA AO INTERAGIR */
slides.addEventListener('mouseenter', () => clearInterval(autoSlide));
slides.addEventListener('touchstart', () => clearInterval(autoSlide));

/* BOTÕES */
document.querySelector('.next').onclick = () => {
  slides.scrollBy({ left: 300, behavior: 'smooth' });
};

document.querySelector('.prev').onclick = () => {
  slides.scrollBy({ left: -300, behavior: 'smooth' });
};

</script>

</body>
</html>
