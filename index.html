/* AUTO SCROLL */
let auto = setInterval(() => {
  slides.scrollLeft += 1.2; // velocidade
}, 15);

/* PAUSA */
const stopAuto = () => clearInterval(auto);

slides.addEventListener('mouseenter', stopAuto);
slides.addEventListener('touchstart', stopAuto);

/* ARRASTAR COM MOUSE */
slides.addEventListener('mousedown', (e) => {
  isDown = true;
  slides.classList.add('active');
  startX = e.pageX - slides.offsetLeft;
  scrollLeft = slides.scrollLeft;
});

slides.addEventListener('mouseleave', () => {
  isDown = false;
});

slides.addEventListener('mouseup', () => {
  isDown = false;
});

slides.addEventListener('mousemove', (e) => {
  if(!isDown) return;
  e.preventDefault();
  const x = e.pageX - slides.offsetLeft;
  const walk = (x - startX) * 1.5;
  slides.scrollLeft = scrollLeft - walk;
});
</script>
